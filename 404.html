<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>الصفحة غير موجودة — أوركي جريل</title>
<meta name="theme-color" content="#073034" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Reem+Kufi:wght@500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100dvh; display: grid; place-items: center; text-align: center;
    background: #073034; color: #F7F1E3; font-family: "Tajawal", sans-serif; padding: 24px;
  }
  .mono { width: 96px; height: 96px; margin-bottom: 28px; }
  .mono path, .mono circle { fill: none; stroke: #C9A24B; }
  h1 { font-family: "El Messiri", serif; font-size: clamp(3.4rem, 12vw, 6rem); color: #E0C786; line-height: 1; }
  h2 { font-family: "El Messiri", serif; font-size: clamp(1.4rem, 5vw, 2rem); margin: 12px 0 14px; }
  p { color: rgba(247,241,227,.8); max-width: 44ch; margin: 0 auto 32px; }
  a {
    display: inline-flex; align-items: center; min-height: 52px; padding: 0 32px;
    background: #C9A24B; color: #1E1A17; font-family: "Reem Kufi", sans-serif; font-weight: 600;
    border-radius: 999px; text-decoration: none; transition: transform .18s ease;
  }
  a:active { transform: scale(.97); }
  a:focus-visible { outline: 3px solid #F7F1E3; outline-offset: 3px; }
</style>
</head>
<body>
  <main>
    <svg class="mono" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="44" stroke-width="2"/>
      <path d="M50 22 v56 M33 34 q17 16 34 0 M33 66 q17 -16 34 0" stroke-width="2.6" stroke-linecap="round"/>
    </svg>
    <h1>٤٠٤</h1>
    <h2>هذه الصفحة غير موجودة</h2>
    <p>يبدو أن الرابط الذي تبحث عنه غير متاح. عُد إلى الصفحة الرئيسية لتتصفّح قائمتنا وتحجز طاولتك.</p>
    <a href="/urki-grill/">العودة إلى الرئيسية</a>
  </main>
</body>
</html>
